<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}

body {
    background-color: #0f0f0f;
    color: #fff;
    overflow-x: hidden;
}

/* PC-FIRST HEADER (SIDE-BY-SIDE) */
header {
    background: #141414;
    padding: 0 30px; 
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #222;
    min-height: 100px;
}

header img {
    height: 100px; 
    width: auto;
    display: block;
}

/* NAVIGATION */
nav {
    display: flex;
    gap: 20px;
}

nav a {
    color: #ccc;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s;
}

nav a:hover {
    color: #e10600;
}

/* PLAYER CONTAINER */
.container {
    padding: 15px;
    display: flex;
    justify-content: center;
}

.player-wrapper {
    width: 100%;
    max-width: 1000px; 
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* MOBILE OPTIMIZATION */
@media (max-width: 768px) {
    header {
        flex-direction: column; 
        padding: 10px;
        min-height: auto;
    }
    header img {
        height: 70px; 
    }
    nav {
        margin-top: 10px;
        gap: 12px;
        width: 100%;
        justify-content: center;
        overflow-x: auto;
        padding-bottom: 8px;
    }
    nav a {
        font-size: 12px;
        white-space: nowrap;
    }
    .container {
        padding: 5px;
    }
}
</style>
</head>

<body>

<header>
    <img src="https://vectorseek.com/wp-content/uploads/2025/10/F1-Formula-1-Logo-PNG-SVG-Vector-01.png" alt="F1 Logo">
    <nav>
        <a onclick="changeStream(1)">Stream 1</a>
        <a onclick="changeStream(2)">Stream 2</a>
        <a onclick="changeStream(3)">Stream 3</a>
        <a onclick="changeStream(4)">Stream 4</a>
        <a onclick="changeStream(5)">Stream 5</a>
        <a onclick="changeStream(6)">Stream 6</a>
    </nav>
</header>

<div class="container">
    <div class="player-wrapper">
        <iframe 
            id="player" 
            src="https://dlstreams.top/stream/stream-60.php" 
            allowfullscreen>
        </iframe>
    </div>
</div>

<script>
function changeStream(num) {
    const links = [
        "https://dlstreams.top/stream/stream-60.php",
        "https://dlstreams.top/cast/stream-60.php",
        "https://dlstreams.top/watch/stream-60.php",
        "https://dlstreams.top/plus/stream-60.php",
        "https://dlstreams.top/casting/stream-60.php",
        "https://dlstreams.top/player/stream-60.php"
    ];

    const player = document.getElementById("player");
    player.src = links[num - 1];

    const navLinks = document.querySelectorAll('nav a');
    navLinks.forEach(link => link.style.color = '#ccc');
    navLinks[num - 1].style.color = '#e10600';
}
</script>

</body>
</html>
